---
- name: Update Linux hosts
  hosts: "{{ target_hosts | default('linux_servers') }}"
  become: yes
  tasks:
    - name: Ensure dpkg is not in a broken state
      ansible.builtin.command: dpkg --configure -a
      changed_when: false
      failed_when: false

    - name: Hold linux-firmware on semaphore host (workaround mirror 500)
      command: apt-mark hold linux-firmware
      when: inventory_hostname == "ansible-semaphore"
      changed_when: false
      failed_when: false

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Wait for apt lock to be free
      ansible.builtin.shell: |
        timeout 300 bash -c 'while sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 5; done'
      changed_when: false

    - name: Upgrade all packages
      apt:
        upgrade: dist

    - name: Unhold linux-firmware on semaphore host
      command: apt-mark unhold linux-firmware
      when: inventory_hostname == "ansible-semaphore"
      changed_when: false
      failed_when: false
