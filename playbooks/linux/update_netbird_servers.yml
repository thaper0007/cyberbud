---
- name: Update Netbird Server
  hosts: netbird_servers
  become: yes
  tasks:
    - name: Pull latest Netbird images
      shell: docker-compose pull
      args:
        chdir: /home/parteek

    - name: Recreate containers with latest images (no down)
      shell: docker-compose up -d --remove-orphans
      args:
        chdir: /home/parteek

    - name: Verify running containers
      shell: "docker ps --format 'table {% raw %}{{.Names}}\t{{.Status}}{% endraw %}'"
      register: docker_status

    - name: Show container status
      debug:
        msg: "{{ docker_status.stdout_lines }}"
